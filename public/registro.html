<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTicket | Registro Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { bg: '#F8FAFC', text: '#1E293B', gold: '#C9A227', goldLight: '#FDF8E8', goldHover: '#B08D21' } } } } }
    </script>
    <style>
        .input-elegant { transition: all 0.2s; border: 1px solid #E2E8F0; }
        .input-elegant:focus { border-color: #C9A227; outline: none; box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.1); }
        .drag-active { border-color: #C9A227 !important; background-color: #FDF8E8 !important; }
    </style>
</head>
<body class="bg-brand-bg text-brand-text min-h-screen flex flex-col items-center justify-center py-10 px-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-lg overflow-hidden relative">
        <div class="bg-white p-8 border-b border-gray-50 text-center">
            <div class="flex justify-center items-center mb-2">
                <i class="fa-solid fa-ticket text-brand-gold text-2xl mr-2"></i>
                <span class="font-serif text-2xl font-bold text-brand-text">Safe<span class="text-brand-gold">Ticket</span></span>
            </div>
            <p class="text-sm text-gray-400">Crea tu cuenta de custodia segura</p>
        </div>

        <div class="px-12 py-6 bg-gray-50/50">
            <div class="relative flex items-center justify-between w-full">
                <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-gray-200 -z-0"></div>
                <div id="progress-line" class="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-brand-gold transition-all duration-500 -z-0" style="width: 0%"></div>
                
                <div class="relative z-10 flex flex-col items-center step-indicator active" data-step="1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-300 bg-brand-gold text-white ring-4 ring-white">1</div>
                    <span class="text-xs font-medium mt-2 text-brand-gold">Datos</span>
                </div>
                <div class="relative z-10 flex flex-col items-center step-indicator" data-step="2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-300 bg-gray-200 text-gray-500 ring-4 ring-white">2</div>
                    <span class="text-xs font-medium mt-2 text-gray-400">Seguridad</span>
                </div>
                <div class="relative z-10 flex flex-col items-center step-indicator" data-step="3">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-300 bg-gray-200 text-gray-500 ring-4 ring-white">3</div>
                    <span class="text-xs font-medium mt-2 text-gray-400">Verificación</span>
                </div>
            </div>
        </div>

        <form id="registrationForm" class="p-8 md:p-12 relative min-h-[400px]" onsubmit="return false;">
            
            <div id="step-1" class="step-content space-y-6">
                <h3 class="text-xl font-serif font-semibold text-brand-text mb-6">Información Personal</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                        <input type="text" id="firstName" class="w-full px-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm" placeholder="Juan">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
                        <input type="text" id="lastName" class="w-full px-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm" placeholder="Pérez">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Identificación</label>
                        <select id="tipo_doc" class="w-full px-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm text-gray-600">
                            <option value="CEDULA">Cédula</option>
                            <option value="PASAPORTE">Pasaporte</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Número de Documento</label>
                        <input type="text" id="num_doc" class="w-full px-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm" placeholder="V-12345678">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Nacimiento</label>
                        <input type="date" id="dob" onchange="validateAge()" class="w-full px-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm text-gray-600">
                        <p id="age-error" class="hidden text-red-500 text-xs mt-1">Debes ser mayor de 18 años.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono Móvil</label>
                        <div class="relative">
                            <i class="fa-solid fa-mobile-screen absolute left-3 top-3.5 text-gray-400"></i>
                            <input type="tel" id="telefono" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm" placeholder="+58 414 000 0000">
                        </div>
                    </div>
                </div>
            </div>

            <div id="step-2" class="step-content hidden space-y-6">
                <h3 class="text-xl font-serif font-semibold text-brand-text mb-6">Configura tu Acceso</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="email" id="email" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm" placeholder="juan@ejemplo.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña Maestra</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="password" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 input-elegant text-sm" placeholder="••••••••">
                    </div>
                    <p class="text-xs text-gray-400 mt-1">Mínimo 8 caracteres.</p>
                </div>
            </div>

            <div id="step-3" class="step-content hidden space-y-6">
                <h3 class="text-xl font-serif font-semibold text-brand-text mb-6">Verificación de Identidad (KYC)</h3>
                <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-brand-gold hover:bg-brand-goldLight/20 group">
                    <input type="file" id="file-upload" class="hidden" accept="image/*,.pdf">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-gray-400"></i>
                    </div>
                    <p class="font-medium text-gray-700">Arrastra tu ID o Pasaporte aquí</p>
                    <p class="text-xs text-gray-400 mt-1">JPG, PNG o PDF (Máx. 5MB)</p>
                    <p id="file-name" class="text-sm text-brand-gold font-bold mt-3 hidden"></p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4 border border-gray-100 mt-4">
                    <label class="flex items-start space-x-3 cursor-pointer">
                        <input type="checkbox" id="legal-check" class="mt-1 w-5 h-5 text-brand-gold border-gray-300 rounded focus:ring-brand-gold">
                        <div class="text-sm text-gray-600">
                            Acepto los <a href="#" class="text-brand-gold hover:underline font-semibold">Términos de Custodia Digital</a> y confirmo mis datos.
                        </div>
                    </label>
                </div>
            </div>

            <div class="mt-10 flex justify-between items-center">
                <button type="button" id="prevBtn" onclick="prevStep()" class="hidden px-6 py-2.5 rounded-lg text-gray-500 font-medium hover:bg-gray-100 transition">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Atrás
                </button>
                <button type="button" id="nextBtn" onclick="nextStep()" class="ml-auto px-8 py-3 bg-brand-gold text-white font-bold rounded-lg shadow-lg hover:bg-brand-goldHover transition-all flex items-center">
                    <span id="nextBtnText">Continuar</span> <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        function nextStep() {
            if (!validateCurrentStep()) return;

            if (currentStep < totalSteps) {
                document.getElementById(`step-${currentStep}`).classList.add('hidden');
                currentStep++;
                document.getElementById(`step-${currentStep}`).classList.remove('hidden');
                updateUI();
            } else {
                const btnText = document.getElementById('nextBtnText');
                const originalText = btnText.innerText;
                btnText.innerText = 'Procesando...';

                const userData = {
                    nombre: document.getElementById('firstName').value,
                    apellido: document.getElementById('lastName').value,
                    tipo_doc: document.getElementById('tipo_doc').value,
                    num_doc: document.getElementById('num_doc').value,
                    fecha_nacimiento: document.getElementById('dob').value,
                    telefono: document.getElementById('telefono').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                };

                fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.exito) {
                        alert('¡Cuenta creada! Tu identidad está PENDIENTE de verificación. Inicia sesión ahora.');
                        window.location.href = '/login.html';
                    } else {
                        alert('Error: ' + data.mensaje);
                        btnText.innerText = originalText;
                    }
                })
                .catch(error => {
                    alert('Error conectando con el servidor.');
                    btnText.innerText = originalText;
                });
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                document.getElementById(`step-${currentStep}`).classList.add('hidden');
                currentStep--;
                document.getElementById(`step-${currentStep}`).classList.remove('hidden');
                updateUI();
            }
        }

        function updateUI() {
            const progress = ((currentStep - 1) / (totalSteps - 1)) * 100;
            document.getElementById('progress-line').style.width = `${progress}%`;

            document.querySelectorAll('.step-indicator').forEach(el => {
                const step = parseInt(el.getAttribute('data-step'));
                const circle = el.querySelector('div');
                const label = el.querySelector('span');
                if (step <= currentStep) {
                    circle.className = 'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-300 bg-brand-gold text-white ring-4 ring-white shadow-lg';
                    label.className = 'text-xs font-medium mt-2 text-brand-gold';
                } else {
                    circle.className = 'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-300 bg-gray-200 text-gray-500 ring-4 ring-white';
                    label.className = 'text-xs font-medium mt-2 text-gray-400';
                }
            });

            document.getElementById('prevBtn').classList.toggle('hidden', currentStep === 1);
            document.getElementById('nextBtnText').innerText = currentStep === totalSteps ? 'Crear Cuenta' : 'Continuar';
        }

        function validateCurrentStep() {
            if (currentStep === 1) {
                const name = document.getElementById('firstName').value;
                const num_doc = document.getElementById('num_doc').value;
                const dob = document.getElementById('dob').value;
                if(!name || !num_doc) { alert('Completa todos los campos'); return false; }
                if (!dob || !isOver18(dob)) {
                    document.getElementById('age-error').classList.remove('hidden');
                    return false;
                }
                document.getElementById('age-error').classList.add('hidden');
            }
            if (currentStep === 2) {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                if (!email.includes('@')) { alert('Correo inválido'); return false; }
                if (pass.length < 8) { alert('La contraseña debe tener 8 caracteres'); return false; }
            }
            if (currentStep === 3) {
                if (!document.getElementById('legal-check').checked) {
                    alert('Debes aceptar los términos.'); return false;
                }
            }
            return true;
        }

        function isOver18(dateString) {
            const today = new Date();
            const birthDate = new Date(dateString);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age >= 18;
        }
    </script>
</body>
</html>
